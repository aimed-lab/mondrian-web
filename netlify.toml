[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  # Functions live inside src/ alongside all other source code.
  # These files are intentionally thin adapters; all logic is in
  # src/api/handlers/ and is shared with the Vite dev middleware.
  directory    = "src/api/functions"
  node_bundler = "esbuild"

# SPA fallback — all routes render index.html (client-side routing).
# Netlify Functions at /.netlify/functions/* are handled before this rule.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
